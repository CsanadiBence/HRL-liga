    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Archives oldal CSS */
        .archives-section {
            min-height: 100vh;
            padding: 100px 0 80px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        }
        .archives-section .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
        }
        .btn-back-modal {
            display: block;
            width: fit-content;
            margin-bottom: 30px;
            padding: 10px 15px;
            background-color: #00d4ff;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 700;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .archives-header {
            text-align: center;
            margin-bottom: 50px;
            width: 100%;
        }
        .archives-title {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }
        .section-subtitle {
            font-size: 1.1rem;
            color: #9aa3af;
            margin-top: 0;
        }
        .archive-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 360px));
            gap: 30px;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .archive-card {
            background: rgba(15, 15, 30, 0.8);
            border: 2px solid rgba(0,212,255,0.2);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            width: 100%;
        }
        .archive-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(102,126,234,0.1));
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 0;
        }
        .archive-card:hover::before {
            opacity: 1;
        }
        .archive-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(0,212,255,0.6);
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.3), 0 0 30px rgba(102, 126, 234, 0.2);
        }
        .archive-card > * {
            position: relative;
            z-index: 1;
        }
        .archive-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0,212,255,0.2);
        }
        .archive-card h3 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }
        .archive-date {
            font-size: 13px;
            color: #9aa3af;
            background: rgba(0,212,255,0.1);
            padding: 4px 12px;
            border-radius: 20px;
        }
        .archive-champ {
            color: #00d4ff;
            font-weight: 700;
            margin: 12px 0 8px 0;
            font-size: 16px;
        }
        .archive-final {
            color: #cfd2d6;
            margin: 0 0 16px 0;
            font-size: 14px;
        }
        .archive-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .btn-view-archive, .btn-delete-archive {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-view-archive {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-view-archive:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(102,126,234,0.4);
        }
        .btn-delete-archive {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            color: white;
        }
        .btn-delete-archive:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(255,65,108,0.4);
        }
        .archive-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            padding: 20px;
            overflow-y: auto;
        }
        .archive-modal-content {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            margin: 40px auto;
            padding: 40px;
            max-width: 1400px;
            width: 95%;
            position: relative;
            box-shadow: 0 20px 80px rgba(0, 212, 255, 0.2);
        }
        .archive-modal .close-modal {
            position: absolute;
            right: 30px;
            top: 30px;
            font-size: 2.5rem;
            color: #00d4ff;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
        }
        .archive-modal .close-modal:hover {
            color: #fff;
            transform: rotate(90deg);
            text-shadow: 0 0 20px #00d4ff;
        }
    </style>
</head>

    <section class="archives-section">
        <div class="container">
            <a href="index.html" class="btn-back-modal">← Vissza a főoldalra</a>
            <div class="archives-header">
                <h1 class="archives-title">Mentett bajnokságok</h1>
                <p class="section-subtitle">Lezárt szezonok és eredmények</p>
            </div>
            <div id="archiveList" class="archive-cards"></div>
        </div>
        
        <!-- Részletes nézet modal -->
        <div id="archiveDetailModal" class="archive-modal">
            <div class="archive-modal-content">

    <script src="app.js"></script>
    <script type="module">
        // Firebase import
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase konfiguráció
        const firebaseConfig = {
            apiKey: "AIzaSyDDXdGSp7OiCl-6tQU1Rm2t82xirXH_Icc",
            authDomain: "ifi2liga.firebaseapp.com",
            projectId: "ifi2liga",
            storageBucket: "ifi2liga.firebasestorage.app",
            messagingSenderId: "1039546710599",
            appId: "1:1039546710599:web:d15d25eb91a2c68e9dfb11"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const archivesCol = collection(db, "archives");
        const ARCHIVE_KEY = 'hrl_archives';

        let currentArchives = [];

        function parseLocalArchives() {
            try {
                const parsed = JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '[]');
                if (!Array.isArray(parsed)) return [];
                return parsed.map(item => ({ ...item, source: 'local' }));
            } catch {
                return [];
            }
        }

        function getArchiveDate(archive) {
            if (archive.finishedAt?.toDate) return archive.finishedAt.toDate();
            if (archive.createdAt?.toDate) return archive.createdAt.toDate();
            if (archive.finishedAtIso) return new Date(archive.finishedAtIso);
            if (archive.createdAtIso) return new Date(archive.createdAtIso);
            return new Date(0);
        }

        // Archives oldal specifikus betöltés
        document.addEventListener('DOMContentLoaded', function() {
            renderArchivesPage();
        });

        function renderArchivesPage() {
            const listEl = document.getElementById('archiveList');
            if (!listEl) return;

            // Real-time listener
            onSnapshot(archivesCol, (snapshot) => {
                const cloudArchives = snapshot.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => {
                        const aDate = getArchiveDate(a);
                        const bDate = getArchiveDate(b);
                        return bDate - aDate;
                    });

                const localArchives = parseLocalArchives();
                const cloudIds = new Set(cloudArchives.map(a => a.id));
                const localOnly = localArchives.filter(a => !cloudIds.has(a.id));

                currentArchives = [...cloudArchives, ...localOnly].sort((a, b) => getArchiveDate(b) - getArchiveDate(a));

                if (currentArchives.length === 0) {
                    listEl.innerHTML = '<p class="muted" style="text-align: center; grid-column: 1/-1; padding: 40px;">Még nincs mentett bajnokság.</p>';
                    return;
                }

                const isAdmin = localStorage.getItem('adminStatus') === 'true';

                listEl.innerHTML = currentArchives.map(archive => {
                    const name = archive.name || 'Ismeretlen bajnokság';
                    const archiveDate = getArchiveDate(archive);
                    const finishedAt = archiveDate ? archiveDate.toLocaleDateString('hu-HU') : '-';
                    const champ = archive.champion?.winnerName || '-';
                    const pairing = archive.champion?.pairing || 'Nincs döntő rögzítve';
                    const score = archive.champion?.finalScore ? ` (${archive.champion.finalScore})` : '';

                    return `
                        <div class="archive-card" data-id="${archive.id}">
                            <div class="archive-head">
                                <h3>${name}</h3>
                                <span class="archive-date">${finishedAt}</span>
                            </div>
                            <p class="archive-champ">🏆 Bajnok: ${champ}</p>
                            <p class="archive-final">Döntő: ${pairing}${score}</p>
                            <div class="archive-actions">
                                <button class="btn-view-archive" onclick="viewArchive('${archive.id}')">📊 Részletek</button>
                                ${isAdmin ? `<button class="btn-delete-archive" onclick="deleteArchive('${archive.id}', '${name}')">🗑️ Törlés</button>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            }, (error) => {
                console.error("Archívum betöltési hiba:", error);
                listEl.innerHTML = '<p class="muted" style="text-align: center; grid-column: 1/-1; padding: 40px;">Hiba az archívum betöltésekor.</p>';
            });
        }

        // Archív törlése
        window.deleteArchive = async function(id, name) {
            if (!confirm(`Biztosan törlöd ezt a bajnokságot?\n\n"${name}"`)) return;

            const localArchive = currentArchives.find(a => a.id === id && a.source === 'local');
            if (localArchive) {
                const saved = parseLocalArchives().filter(a => a.id !== id).map(({ source, ...rest }) => rest);
                localStorage.setItem(ARCHIVE_KEY, JSON.stringify(saved));
                currentArchives = currentArchives.filter(a => a.id !== id);
                window.location.reload();
                alert('Helyi bajnokság törölve!');
                return;
            }

            try {
                await deleteDoc(doc(db, 'archives', id));
                alert('Bajnokság törölve!');
            } catch (error) {
                console.error('Törlési hiba:', error);
                alert('Hiba történt a törlésnél: ' + error.message);
            }
        }

        // Archív részletes nézete
        window.viewArchive = function(id) {
            const archive = currentArchives.find(a => a.id === id);
            if (!archive) return;

            const modal = document.getElementById('archiveDetailModal');
            const content = document.getElementById('archiveDetailContent');

            let html = `
                <div style="max-width: 1200px; margin: 0 auto;">
                    <h2 style="text-align: center; margin-bottom: 40px; font-size: 2.5rem; color: #fff;">${archive.name}</h2>
                    
                    <!-- Bajnok információ -->
                    <div style="background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,165,0,0.1)); border: 3px solid gold; border-radius: 20px; padding: 40px; margin-bottom: 50px; text-align: center; box-shadow: 0 10px 40px rgba(255,215,0,0.3);">
                        <h3 style="font-size: 2rem; color: gold; margin-bottom: 15px; text-shadow: 0 0 20px rgba(255,215,0,0.5);">🏆 BAJNOK</h3>
                        <p style="font-size: 2.5rem; font-weight: 900; color: #fff; margin: 15px 0; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">${archive.champion?.winnerName || 'Nincs adat'}</p>
                        <p style="font-size: 1.2rem; color: #bbb; margin: 10px 0;">Döntő ellenfél: ${archive.champion?.runnerUpName || 'Nincs adat'}</p>
                        <p style="font-size: 2rem; color: #00d4ff; margin-top: 15px; font-weight: 700;">${archive.champion?.finalScore || '-'}</p>
                    </div>

                    <!-- Csoporttáblázatok -->
                    <h3 style="margin-bottom: 30px; color: #00d4ff; font-size: 1.8rem; border-bottom: 2px solid rgba(0,212,255,0.3); padding-bottom: 15px;">📋 Csoportok végeredménye</h3>
                    <div style="display: grid; gap: 30px; margin-bottom: 50px;">
            `;

            // Csoportok és táblázatok számolása
            const groups = archive.groups || archive.leagues || [];
            const matches = archive.matches || [];
            const players = archive.players || [];
            
            // Csoportok rendezése ABC sorrendben
            const sortedGroups = [...groups].sort((a, b) => a.name.localeCompare(b.name, 'hu'));
            
            sortedGroups.forEach(group => {
                html += `<div style="background: rgba(15,15,30,0.6); border: 2px solid rgba(0,212,255,0.3); border-radius: 15px; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.3);">`;
                html += `<h4 style="color: #00d4ff; margin-bottom: 20px; font-size: 1.4rem; font-weight: 700;">${group.name}</h4>`;
                
                // Kiszámoljuk a standings-t (régi groupId és új leagueId séma támogatással)
                const groupPlayers = players.filter(p => p.groupId === group.id || p.leagueId === group.id);
                const groupMatches = matches.filter(m => m.groupId === group.id || m.leagueId === group.id);
                
                const standings = groupPlayers.map(player => {
                    let wins = 0, draws = 0, losses = 0, goalsFor = 0, goalsAgainst = 0;
                    
                    groupMatches.forEach(match => {
                        const homePlayerId = match.homeId || match.homePlayerId;
                        const awayPlayerId = match.awayId || match.awayPlayerId;
                        const homeGoals = Number(match.homeGoals || 0);
                        const awayGoals = Number(match.awayGoals || 0);

                        if (homePlayerId === player.id) {
                            goalsFor += homeGoals;
                            goalsAgainst += awayGoals;
                            if (homeGoals > awayGoals) wins++;
                            else if (homeGoals === awayGoals) draws++;
                            else losses++;
                        } else if (awayPlayerId === player.id) {
                            goalsFor += awayGoals;
                            goalsAgainst += homeGoals;
                            if (awayGoals > homeGoals) wins++;
                            else if (awayGoals === homeGoals) draws++;
                            else losses++;
                        }
                    });
                    
                    return {
                        name: player.name,
                        played: wins + draws + losses,
                        wins, draws, losses,
                        goalsFor, goalsAgainst,
                        goalDiff: goalsFor - goalsAgainst,
                        points: wins * 3 + draws
                    };
                }).sort((a, b) => {
                    if (b.points !== a.points) return b.points - a.points;
                    if (b.goalDiff !== a.goalDiff) return b.goalDiff - a.goalDiff;
                    return b.goalsFor - a.goalsFor;
                });

                // Táblázat megjelenítése
                html += `
                    <div style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse; text-align: center; min-width: 600px;">
                            <thead>
                                <tr style="background: rgba(0,212,255,0.15); color: #00d4ff;">
                                    <th style="padding: 12px 8px; text-align: left; border-bottom: 2px solid rgba(0,212,255,0.3);">#</th>
                                    <th style="padding: 12px; text-align: left; border-bottom: 2px solid rgba(0,212,255,0.3);">Csapat</th>
                                    <th style="padding: 12px 8px; border-bottom: 2px solid rgba(0,212,255,0.3);">M</th>
                                    <th style="padding: 12px 8px; border-bottom: 2px solid rgba(0,212,255,0.3);">Gy</th>
                                    <th style="padding: 12px 8px; border-bottom: 2px solid rgba(0,212,255,0.3);">D</th>
                                    <th style="padding: 12px 8px; border-bottom: 2px solid rgba(0,212,255,0.3);">V</th>
                                    <th style="padding: 12px 8px; border-bottom: 2px solid rgba(0,212,255,0.3);">GF</th>
                                    <th style="padding: 12px 8px; border-bottom: 2px solid rgba(0,212,255,0.3);">GA</th>
                                    <th style="padding: 12px 8px; border-bottom: 2px solid rgba(0,212,255,0.3);">GD</th>
                                    <th style="padding: 12px 8px; font-weight: 900; border-bottom: 2px solid rgba(0,212,255,0.3);">Pont</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                
                standings.forEach((team, idx) => {
                    const rowColor = idx < 4 ? 'rgba(16,185,129,0.10)' : 'rgba(255,255,255,0.02)';
                    const trophy = idx === 0 ? '🥇 ' : idx === 1 ? '🥈 ' : '';
                    const qualifiedTag = idx < 4 ? ' <small style="color:#10b981; font-weight:700;">(Továbbjutó)</small>' : '';
                    html += `
                        <tr style="background: ${rowColor}; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s;">
                            <td style="padding: 14px 8px; text-align: left; color: #00d4ff; font-weight: 700; font-size: 1.1rem;">${idx + 1}</td>
                            <td style="padding: 14px; text-align: left; font-weight: 600; font-size: 1.05rem; color: #fff;">${trophy}${team.name}${qualifiedTag}</td>
                            <td style="padding: 14px 8px; color: #ccc;">${team.played}</td>
                            <td style="padding: 14px 8px; color: #4ade80; font-weight: 600;">${team.wins}</td>
                            <td style="padding: 14px 8px; color: #fbbf24; font-weight: 600;">${team.draws}</td>
                            <td style="padding: 14px 8px; color: #ef4444; font-weight: 600;">${team.losses}</td>
                            <td style="padding: 14px 8px; color: #ccc;">${team.goalsFor}</td>
                            <td style="padding: 14px 8px; color: #ccc;">${team.goalsAgainst}</td>
                            <td style="padding: 14px 8px; color: ${team.goalDiff >= 0 ? '#4ade80' : '#ef4444'}; font-weight: 600;">${team.goalDiff >= 0 ? '+' : ''}${team.goalDiff}</td>
                            <td style="padding: 14px 8px; font-weight: 900; font-size: 1.2rem; color: #00d4ff;">${team.points}</td>
                        </tr>
                    `;
                });
                
                html += `
                            </tbody>
                        </table>
                        <p style="margin-top: 12px; color: #10b981; font-weight: 700;">✅ Innen az első 4 helyezett jutott tovább a playoffba.</p>
                    </div>
                `;
                
                html += `</div>`;
            });

            html += `</div>`; // Close groups grid

            // Playoff bracket
            const playoffMatches = (archive.playoffMatches || []).map(m => {
                let normalizedRound = m.round;
                if (!normalizedRound && m.matchId) {
                    if (m.matchId.startsWith('r16-')) normalizedRound = 'r16';
                    else if (m.matchId.startsWith('q-')) normalizedRound = 'quarter';
                    else if (m.matchId.startsWith('s-')) normalizedRound = 'semi';
                    else if (m.matchId === 'final') normalizedRound = 'final';
                    else if (m.matchId === 'bronze') normalizedRound = 'bronze';
                }
                return { ...m, normalizedRound };
            });

            const hasAnyPlayoff = playoffMatches.some(m => ['r16', 'quarter', 'semi', 'bronze', 'final'].includes(m.normalizedRound));
            if (hasAnyPlayoff) {
                html += `<h3 style="margin-bottom: 30px; color: #00d4ff; font-size: 1.8rem; border-bottom: 2px solid rgba(0,212,255,0.3); padding-bottom: 15px;">🏅 Playoff Bracket</h3>`;
                html += `<div style="background: rgba(15,15,30,0.6); border: 2px solid rgba(0,212,255,0.3); border-radius: 15px; padding: 30px; margin-bottom: 40px; box-shadow: 0 5px 20px rgba(0,0,0,0.3);">`;
                
                const rounds = {
                    'r16': '🔥 Nyolcaddöntő',
                    'quarter': '⚔️ Negyeddöntők',
                    'semi': '⚡ Elődöntők',
                    'bronze': '🥉 Bronzmeccs',
                    'final': '🏆 Döntő'
                };

                ['r16', 'quarter', 'semi', 'bronze', 'final'].forEach(roundKey => {
                    const roundMatches = playoffMatches.filter(m => m.normalizedRound === roundKey);
                    if (roundMatches.length > 0) {
                        html += `<div style="margin-bottom: 25px;"><h4 style="color: #00d4ff; margin-bottom: 15px; font-size: 1.3rem;">${rounds[roundKey]}</h4>`;
                        roundMatches.forEach(match => {
                            const home = archive.players.find(p => p.id === (match.homeId || match.homePlayerId));
                            const away = archive.players.find(p => p.id === (match.awayId || match.awayPlayerId));
                            const homeName = home?.name || match.homePlayer || '?';
                            const awayName = away?.name || match.awayPlayer || '?';
                            const homeGoals = Number(match.homeGoals || 0);
                            const awayGoals = Number(match.awayGoals || 0);
                            const winner = homeGoals === awayGoals ? 'draw' : (homeGoals > awayGoals ? 'home' : 'away');
                            html += `
                                <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 2px solid rgba(0,212,255,0.1);">
                                    <span style="flex: 1; font-size: 1.1rem; color: ${winner === 'home' ? '#4ade80' : '#ccc'}; font-weight: ${winner === 'home' ? '700' : '400'};">${homeName}</span>
                                    <span style="color: gold; font-weight: 900; font-size: 1.8rem; padding: 0 40px; text-shadow: 0 2px 10px rgba(255,215,0,0.3);">${homeGoals} : ${awayGoals}</span>
                                    <span style="flex: 1; text-align: right; font-size: 1.1rem; color: ${winner === 'away' ? '#4ade80' : '#ccc'}; font-weight: ${winner === 'away' ? '700' : '400'};">${awayName}</span>
                                </div>
                            `;
                        });
                        html += `</div>`;
                    }
                });
                
                html += `</div>`;
            }

            html += `<button onclick="closeArchiveDetail()" style="margin-top: 30px; padding: 15px 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 1.1rem; font-weight: 700; width: 100%; transition: all 0.3s ease; box-shadow: 0 5px 20px rgba(102,126,234,0.3);" onmouseover="this.style.transform='scale(1.02)'; this.style.boxShadow='0 8px 30px rgba(102,126,234,0.5)';" onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 5px 20px rgba(102,126,234,0.3)';">Bezárás</button>`;

            html += `</div>`; // Close max-width wrapper

            content.innerHTML = html;
            modal.style.display = 'flex';
        }

        window.closeArchiveDetail = function() {
            const modal = document.getElementById('archiveDetailModal');
            modal.style.display = 'none';
        }
    </script>
</body>
</html>
